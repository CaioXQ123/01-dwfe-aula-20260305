<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu site de Notícias</title>
    <script src="./assets/js/login.js"></script>
    <script src="https://kit.fontawesome.com/08b476a59a.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/assets/css/login/estilo.css">
</head>
<body>
    <header>
        <div class="logo">C</div>
        <h1 class="titulo">Meu site de Notícias</h1>
    </header>
    <div class="container">
        <h1>Login</h1>
        <form>
            <div class="input-grupo">
                <i class="fas fa-envelope"></i>
                <input type="text" id="email" placeholder="Informe seu e-mail">
            </div>
            <div class="input-grupo">
                <i class="fas fa-lock"></i>
                <input type="text" id="senha" type="password" placeholder="Informe sua senha">
            </div>
            <button onclick="verificarCredenciais(); return false;">
                <i class="fas fa-sign-in-alt"></i>
                Entrar
            </button>
        </form>
        <div class="links-auxiliares">
            <a href="#">Esqueci minha senha</a>
            <span>-</span>
            <a href="#">Registre-se</a>
        </div>
    </div>
</body>
</html>
